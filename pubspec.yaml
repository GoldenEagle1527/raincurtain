name: raincurtain
description: "RainCurtain - 雨幕插件系统"
publish_to: 'none'
version: 1.2.5+2

environment:
  sdk: ^3.11.3

dependencies:
  archive: ^4.0.9
  crypto: ^3.0.3
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_inappwebview: ^6.1.5
  flutter_local_notifications: ^18.0.1
  flutter_svg: ^2.0.10
  http: ^1.6.0
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  pointycastle: ^4.0.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  sqflite_common_ffi: ^2.4.0
  uuid: ^4.5.3
  yaml: ^3.1.3
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  
  # Material Icons 字体资源
  assets:
    - assets/fonts/material-icons/
    - assets/s3_config.json
  
  fonts:
    # 全局默认字体 - 思源宋体
    - family: NotoSerifSC
      fonts:
        - asset: assets/fonts/NotoSerifSC-VariableFont_wght.ttf
    
    # Material Icons 字体
    - family: MaterialIcons
      fonts:
        - asset: assets/fonts/material-icons/MaterialIcons-Regular.ttf
    
    - family: MaterialIconsOutlined
      fonts:
        - asset: assets/fonts/material-icons/MaterialIconsOutlined-Regular.otf
    
    - family: MaterialIconsRounded
      fonts:
        - asset: assets/fonts/material-icons/MaterialIconsRounded-Regular.otf
    
    - family: MaterialIconsSharp
      fonts:
        - asset: assets/fonts/material-icons/MaterialIconsSharp-Regular.otf
    
    - family: MaterialIconsTwoTone
      fonts:
        - asset: assets/fonts/material-icons/MaterialIconsTwoTone-Regular.otf

flutter_launcher_icons:
  android: true
  windows:
    generate: true
    image_path: "icon.png"
    icon_size: 256
  image_path: "icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "icon.png"
