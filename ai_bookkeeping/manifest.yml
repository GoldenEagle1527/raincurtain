id: "019e015b-5acf-7356-9759-7e68435a8ba9"
name: "AI记账"
description: "借助AI模型帮你记账"
version: "1.0.0"
author: "GoldenEagle"
icon: "material:account_balance_wallet"

inputs:
  - name: "api_key"
    type: "string"
    description: "OpenAI 兼容 API 密钥"
    default: "eaa4b900-1ac3-4da7-8990-b208987de3c9"
  - name: "base_url"
    type: "string"
    description: "API 基础地址"
    default: "https://ark.cn-beijing.volces.com/api/v3"
  - name: "model"
    type: "string"
    description: "模型名称"
    default: "ep-20260507152944-4rpvk"
  - name: "system_prompt"
    type: "string"
    description: "系统提示词"
    default: |
      你是一个记账语音文本解析助手。用户会发送自然语言描述的消费或收入记录，你需要从中提取以下字段并以 JSON 格式返回：

      {
        "item": "消费/收入项目名称",
        "category": "分类",
        "amount": 金额(数字),
        "note": "备注(可选，没有则为空字符串)",
        "type": "expense 或 income"
      }

      分类必须从以下列表中选择：
      餐饮, 购物, 交通, 住房, 娱乐, 医疗, 教育, 通讯, 日用, 服饰, 旅行, 人情社交, 其他

      type 字段判断规则：
      - 默认为 "expense"（支出）
      - 如果用户提到"工资""到账""收入""进账""报销""红包收到""转入""奖金""补贴""退款"等明确的收入行为，则为 "income"
      - 如果无法判断，默认为 "expense"

      注意事项：
      1. 金额必须是正数
      2. 如果用户没有明确说明金额，尝试从上下文推断
      3. 如果完全无法确定金额，返回 0
      4. 备注字段用于记录用户提到的额外信息，如时间、地点、与谁等
      5. 只返回 JSON，不要返回其他任何内容
      6. 不要用 markdown 代码块包裹 JSON

      示例：
      用户："中午吃麻辣烫花了18"
      返回：{"item": "麻辣烫", "category": "餐饮", "amount": 18, "note": "午饭", "type": "expense"}

      用户："这个月工资到账8000"
      返回：{"item": "工资", "category": "其他", "amount": 8000, "note": "月工资", "type": "income"}

      用户："打车去公司30块"
      返回：{"item": "打车", "category": "交通", "amount": 30, "note": "去公司", "type": "expense"}

outputs:
  - name: "last_record"
    type: "string"
    description: "最近一次记账的记录(JSON字符串)"

storage:
  - name: "records"
    columns:
      - name: "item"
        type: "text"
      - name: "category"
        type: "text"
      - name: "amount"
        type: "real"
      - name: "note"
        type: "text"
      - name: "type"
        type: "text"
      - name: "created_at"
        type: "text"
